apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ttsl-3tier-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Bommalapuram/ttsl-billing-system.git'
    targetRevision: HEAD
    path: helm-chart
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
